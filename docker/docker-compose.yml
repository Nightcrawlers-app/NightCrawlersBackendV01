services:
  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nightcrawlers_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - nightcrawlers_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── MongoDB (local dev / self-hosted) ────────────────────────────────────────
  # Comment this out if you're using MongoDB Atlas
  mongo:
    image: mongo:7
    container_name: nightcrawlers_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: nightcrawlers
    networks:
      - nightcrawlers_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nightcrawlers_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nightcrawlers.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # SSL certs from certbot
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - nightcrawlers_net

volumes:
  mongo_data:
  certbot_webroot:

networks:
  nightcrawlers_net:
    driver: bridge
