# /etc/nginx/conf.d/nightcrawlers.conf
# Place this file on your server at: /opt/nightcrawlers/nginx/nightcrawlers.conf
#
# Assumptions:
#   - Your API subdomain:  api.nightcrawlers.com
#   - SSL certs managed by certbot (Let's Encrypt)
#   - Docker network: nightcrawlers_net
#   - API container name: nightcrawlers_api on port 5000

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.nightcrawlers.com;

    # Let certbot renew certs
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.nightcrawlers.com;

    # SSL — issued by certbot
    ssl_certificate     /etc/letsencrypt/live/api.nightcrawlers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nightcrawlers.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options       DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # Rate limiting (define zone in nginx.conf main context or here)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Proxy to Node API ──────────────────────────────────────────────────
    location / {
        # limit_req zone=api burst=10 nodelay;

        proxy_pass         http://nightcrawlers_api:5000;
        proxy_http_version 1.1;

        # WebSocket support (for future real-time order tracking)
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Allow large payloads (base64 image uploads)
        client_max_body_size 15m;
    }

    # Health check endpoint — bypass rate limiting for monitoring tools
    location = /health {
        proxy_pass http://nightcrawlers_api:5000/;
        access_log off;
    }
}
