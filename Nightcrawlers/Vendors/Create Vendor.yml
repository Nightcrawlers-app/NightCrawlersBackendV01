info:
  name: Create Vendor
  type: http

http:
  method: POST
  url: http://localhost:5000/api/vendors
  body:
    type: json
    data: |-
      {
        "firstName": "Test",
        "lastName": "Vendor",
        "businessType": "Pharmacy",
        "phoneNumber": "08012345678",
        "email": "uzogeorgia@gmail.com",
        "location": "Abuja",
        "password": "password123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
